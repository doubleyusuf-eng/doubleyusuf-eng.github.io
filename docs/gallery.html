<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anesthesia Briefs - Ekran Görüntüleri Galerisi</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8F6F0;
            color: #1E293B;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
        }
        h1 {
            font-family: 'Outfit', sans-serif;
            color: #1B365D;
            font-size: 36px;
            margin-bottom: 10px;
        }
        p {
            color: #64748B;
            font-size: 16px;
            max-width: 600px;
            margin: 0 auto;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 30px;
        }
        .card {
            background: #EFEBE0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            text-align: center;
            padding: 15px;
            border: 1px solid rgba(27, 54, 93, 0.05);
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(27, 54, 93, 0.08);
            border-color: #C2A267;
        }
        img {
            width: 100%;
            border-radius: 12px;
            display: block;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .label {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 18px;
            color: #1B365D;
            margin-bottom: 5px;
        }
        .name {
            font-size: 12px;
            color: #64748B;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="margin-bottom: 20px;">
                <a href="index.html" style="text-decoration:none; color:#1B365D; font-weight:600; margin-right:20px; font-size:14px;"><i class="fa-solid fa-arrow-left"></i> Ana Sayfa</a>
                <a href="game.html" style="text-decoration:none; color:#C2A267; font-weight:600; font-size:14px;"><i class="fa-solid fa-gamepad"></i> Laringoskop Oyunu Oyna</a>
            </div>
            <h1>Anesthesia Briefs Ekran Görüntüleri Galerisi</h1>
            <p>Aşağıda uygulama görüntülerinden kopyalanan tüm 17 ekran görüntüsünün listesi yer almaktadır. Hangi ekranın hangi modüle (Board Soruları, Spot Bilgiler, Arama vb.) ait olduğunu buradan inceleyebilirsiniz.</p>
        </header>
        <div class="grid" id="galleryGrid">
            <!-- Dynamically generated items -->
        </div>
    </div>

    <script>
        const originalNames = [
            "Screenshot_20260531_001421_Anesthesia Briefs.jpg",
            "Screenshot_20260531_001436_Anesthesia Briefs.jpg",
            "Screenshot_20260531_001504_Anesthesia Briefs.jpg",
            "Screenshot_20260531_001518_Anesthesia Briefs.jpg",
            "Screenshot_20260531_001526_Anesthesia Briefs.jpg",
            "Screenshot_20260531_001535_Anesthesia Briefs.jpg",
            "Screenshot_20260531_001548_Anesthesia Briefs.jpg",
            "Screenshot_20260531_001557_Anesthesia Briefs.jpg",
            "Screenshot_20260531_001610_Anesthesia Briefs.jpg",
            "Screenshot_20260531_001617_Anesthesia Briefs.jpg",
            "Screenshot_20260531_001624_Anesthesia Briefs.jpg",
            "Screenshot_20260531_001639_Anesthesia Briefs.jpg",
            "Screenshot_20260531_001708_Anesthesia Briefs.jpg",
            "Screenshot_20260531_001831_Anesthesia Briefs.jpg",
            "Screenshot_20260531_001839_Anesthesia Briefs.jpg",
            "Screenshot_20260531_001859_Anesthesia Briefs.jpg",
            "Screenshot_20260531_001905_Anesthesia Briefs.jpg"
        ];

        const grid = document.getElementById('galleryGrid');
        for (let i = 1; i <= 17; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            
            const img = document.createElement('img');
            img.src = `assets/screenshots/screen_${i}.jpg`;
            img.alt = `Screen ${i}`;
            
            const label = document.createElement('div');
            label.className = 'label';
            label.textContent = `screen_${i}.jpg`;
            
            const name = document.createElement('div');
            name.className = 'name';
            name.textContent = originalNames[i-1];
            
            card.appendChild(img);
            card.appendChild(label);
            card.appendChild(name);
            grid.appendChild(card);
        }
    </script>
</body>
</html>
